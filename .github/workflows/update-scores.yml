name: Update World Cup scores

# Pulls fresh match data from football-data.org and commits data.json.
# GitHub Pages (deploy-from-branch) redeploys automatically on the commit.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC). Tune or pause after the tournament.
  workflow_dispatch: {}       # lets you run it on demand from the Actions tab

# Allow the job to push the updated data.json back to the repo.
permissions:
  contents: write

# If a run is still going when the next tick fires, skip rather than stack up.
concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-scores.mjs

      - name: Commit if changed
        run: |
          git config user.name  "casium-scorebot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No score changes."
          else
            git add data.json
            git commit -m "scores: auto-update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
